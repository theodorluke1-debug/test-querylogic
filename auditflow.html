<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>AuditFlow - Web Intelligence</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<style>
  /* ── GLOBAL STYLES ──── */
  :root {
    --bg: #030303;
    --bg-2: #111111;
    --text: #e5e5e5;
    --text-dim: #888;
    --primary: #c8f135;
    --danger: #c0000a;
    --warn: #b26000;
    --good: #3d7a00;
    --border: #333;
    --font-main: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-main);
    margin: 0; padding: 0;
    min-height: 100vh;
    overflow-x: hidden;
  }

  * { box-sizing: border-box; }

  /* ── UI COMPONENTS ──── */
  .container { max-width: 1200px; margin: 0 auto; padding: 0 16px; }
  
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    border: none;
    font-size: 14px;
    transition: all 0.2s;
    gap: 8px;
  }

  .btn-primary { background: var(--primary); color: #000; }
  .btn-primary:hover { opacity: 0.9; box-shadow: 0 0 15px rgba(200, 241, 53, 0.4); }
  
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { background: var(--bg-2); }

  .btn-danger { background: var(--danger); color: white; }
  
  input, select, textarea {
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px;
    border-radius: 6px;
    font-family: inherit;
    width: 100%;
    margin-bottom: 12px;
  }

  label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--text-dim); }

  /* ── TABLES ──── */
  table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
  th, td { text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  th { font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); }
  td { font-size: 14px; }
  
  /* ── BADGES & TOAST ──── */
  .badge {
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    display: inline-block;
  }
  .badge-e { background: rgba(192, 0, 10, 0.2); color: var(--danger); border: 1px solid var(--danger); }
  .badge-w { background: rgba(178, 96, 0, 0.2); color: var(--warn); border: 1px solid var(--warn); }
  .badge-c { background: rgba(61, 122, 0, 0.2); color: var(--good); border: 1px solid var(--good); }

  .toast-container {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    z-index: 1000; display: flex; flex-direction: column; gap: 8px;
  }
  .toast {
    background: #222; padding: 16px; border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--border);
    font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; pointer-events: auto; }

  /* ── PDF REPORT STYLES ──── */
  #pdf-report {
    font-family: Helvetica, Arial, sans-serif;
    color: #000;
    background: white;
    padding: 40px;
    width: 100%;
    height: 100%;
  }
  #pdf-report h1 { font-size: 24px; margin-bottom: 20px; color: #000; }
  #pdf-report .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 30px; }
  #pdf-report .summary-box { padding: 10px; background: #f9f9f9; border-radius: 6px; }
  #pdf-report .summary-box h3 { margin: 0 0 4px 0; font-size: 14px; text-transform: uppercase; color: #666; }
  #pdf-report table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
  #pdf-report th { background: #eee; text-align: left; padding: 8px; font-weight: bold; }
  #pdf-report td { padding: 8px; border-bottom: 1px solid #eee; }
  #pdf-report .status-error { color: #c0000a; }
  #pdf-report .status-warning { color: #b26000; }
  #pdf-report .status-success { color: #3d7a00; }

</style>
</head>

      </thead>
      <tbody id="results-body">
        <!-- Rows inserted via JS -->
      </tbody>
    </table>
