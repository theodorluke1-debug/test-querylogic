<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuditFlow Dashboard — Premium Web Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
    :root { --lime: #c8f135; --void: #030303; --zinccard: #0c0c0c; }
    body { font-family: 'Inter', sans-serif; background-color: var(--void); color: #fff; -webkit-font-smoothing: antialiased; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    .bg-lime { background-color: var(--lime); }
    .text-lime { color: var(--lime); }
    .border-lime { border-color: var(--lime); }
    .bg-zinccard { background-color: var(--zinccard); }
    .bg-void { background-color: var(--void); }
    
    /* Skeleton Animation */
    .skeleton { background: linear-gradient(90deg, #161616 25%, #1f1f1f 50%, #161616 75%); background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; }
    @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    
    /* Spinner */
    .audit-spinner { width: 14px; height: 14px; border: 2px solid rgba(200, 241, 53, 0.2); border-top-color: var(--lime); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <!-- Header -->
  <header class="sticky top-0 z-50 border-b border-zinc-800/50 bg-void/80 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-lime rounded-lg flex items-center justify-center">
          <i data-lucide="radar" class="w-5 h-5 text-void"></i>
        </div>
        <span class="text-lg font-bold tracking-tight">AuditFlow <span class="text-[10px] uppercase bg-lime/10 text-lime px-1.5 py-0.5 rounded ml-1">Pro</span></span>
      </div>
      <div class="flex items-center gap-4">
        <button id="btnSignOut" class="text-xs font-medium text-zinc-400 hover:text-white transition">Abmelden</button>
        <div id="userBadge" class="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-full bg-zinc-900 border border-zinc-800">
          <div class="w-2 h-2 rounded-full bg-lime animate-pulse"></div>
          <span id="userEmail" class="text-[11px] font-mono text-zinc-300">...</span>
        </div>
      </div>
    </div>
  </header>

  <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
    <div class="grid lg:grid-cols-[1fr_320px] gap-8">
      <!-- Left Column: Audit Interface -->
      <div class="space-y-6">
        <div class="rounded-2xl border border-zinc-800 bg-zinccard p-6 shadow-sm">
          <h2 class="text-sm font-semibold text-white mb-4 flex items-center gap-2">
            <i data-lucide="search" class="w-4 h-4 text-lime"></i> Neues Audit starten
          </h2>
          <div class="flex flex-col sm:flex-row gap-3">
            <input id="dashUrl" type="url" placeholder="https://ihre-website.de" class="flex-1 rounded-xl border border-zinc-700 bg-void px-4 py-3 text-sm font-mono text-white focus:outline-none focus:ring-2 focus:ring-lime/25 transition-all" />
            <button id="btnPerformAudit" class="rounded-xl bg-lime text-void px-6 py-3 text-sm font-semibold hover:brightness-95 transition flex items-center justify-center gap-2">
              <i data-lucide="zap" class="w-4 h-4"></i> Audit ausführen
            </button>
          </div>
        </div>

        <!-- Skeleton Loader -->
        <div id="dashSkeleton" class="hidden space-y-4">
          <div class="rounded-2xl border border-zinc-800 bg-zinccard p-5">
            <div class="flex items-center gap-3 mb-4">
              <span class="audit-spinner"></span>
              <p class="text-xs font-mono text-lime">Deep-Audit läuft...</p>
            </div>
            <div class="space-y-2">
              <div class="skeleton h-3 w-full rounded"></div>
              <div class="skeleton h-3 w-5/6 rounded"></div>
              <div class="skeleton h-3 w-4/6 rounded"></div>
            </div>
          </div>
        </div>

        <!-- Results Area -->
        <div id="dashResults" class="hidden space-y-6">
          <!-- Main Score & Dimensions -->
          <div class="grid sm:grid-cols-2 gap-4">
            <div class="rounded-2xl border border-zinc-800 bg-zinccard p-8 flex flex-col items-center justify-center text-center">
              <p class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest mb-4">Gesamt-Score</p>
              <div id="dashGauge" class="relative flex items-center justify-center">
                <!-- Score will be injected here -->
              </div>
              <p id="dashBand" class="text-xs text-zinc-500 mt-4"></p>
            </div>
            <div class="rounded-2xl border border-zinc-800 bg-zinccard p-6">
              <p class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest mb-4">Dimensionen</p>
              <div id="dashDims" class="space-y-4">
                <!-- Dimensions will be injected here -->
              </div>
            </div>
          </div>

          <!-- PREMIUM: Core Web Vitals -->
          <div class="rounded-2xl border border-zinc-800 bg-zinccard p-6">
            <div class="flex items-center justify-between mb-6">
              <p class="text-xs font-mono text-lime uppercase tracking-wider">Core Web Vitals (Schätzung)</p>
              <span class="text-[10px] text-zinc-500 bg-zinc-900 px-2 py-1 rounded">Real-User Metrics</span>
            </div>
            <div id="dashCoreWebVitals" class="grid grid-cols-2 sm:grid-cols-4 gap-4">
              <!-- CWV will be injected here -->
            </div>
          </div>

          <!-- PREMIUM: Accessibility & Resources -->
          <div class="grid sm:grid-cols-2 gap-4">
            <div class="rounded-2xl border border-zinc-800 bg-zinccard p-6">
              <p class="text-xs font-mono text-lime uppercase tracking-wider mb-6">Barrierefreiheit (WCAG 2.1)</p>
              <div id="dashAccessibility" class="flex flex-col items-center py-2">
                <!-- Accessibility will be injected here -->
              </div>
            </div>
            <div class="rounded-2xl border border-zinc-800 bg-zinccard p-6">
              <p class="text-xs font-mono text-lime uppercase tracking-wider mb-6">Ressourcen-Analyse</p>
              <div id="dashResources" class="space-y-3">
                <!-- Resources will be injected here -->
              </div>
            </div>
          </div>

          <!-- Action Checklist -->
          <div class="rounded-2xl border border-zinc-800 bg-zinccard p-6">
            <p class="text-xs font-mono text-lime uppercase tracking-wider mb-4">Handlungs-Checkliste</p>
            <ul id="dashActions" class="space-y-1"></ul>
          </div>

          <!-- Export Buttons -->
          <div class="flex flex-wrap gap-3 pt-4">
            <button id="btnPrint" class="rounded-xl border border-zinc-700 px-5 py-2.5 text-sm font-medium hover:bg-zinc-800 transition flex items-center gap-2">
              <i data-lucide="printer" class="w-4 h-4"></i> Drucken
            </button>
            <button id="btnPdfPremium" class="rounded-xl border border-lime/40 bg-lime/10 text-lime px-5 py-2.5 text-sm font-bold hover:bg-lime/20 transition flex items-center gap-2">
              <i data-lucide="file-text" class="w-4 h-4"></i> 📄 Premium PDF Report
            </button>
            <button id="btnSaveAudit" class="rounded-xl border border-zinc-700 px-5 py-2.5 text-sm font-medium hover:bg-zinc-800 transition flex items-center gap-2">
              <i data-lucide="save" class="w-4 h-4"></i> In Cloud speichern
            </button>
          </div>
          <p id="dashSaveMsg" class="text-xs font-mono text-zinc-500 text-center"></p>
        </div>
      </div>

      <!-- Right Column: Sidebar -->
      <aside class="space-y-6">
        <div class="rounded-2xl border border-zinc-800 bg-zinccard p-5 sticky top-24">
          <h3 class="text-xs font-semibold text-white uppercase tracking-wider mb-4 flex items-center gap-2">
            <i data-lucide="history" class="w-4 h-4 text-zinc-500"></i> Letzte Audits
          </h3>
          <ul id="dashHistory" class="text-[11px] font-mono text-zinc-500 space-y-3 max-h-[400px] overflow-y-auto pr-2">
            <!-- History will be injected here -->
          </ul>
        </div>
      </aside>
    </div>
  </main>

  <footer class="border-t border-zinc-900 py-8 mt-12">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p class="text-xs text-zinc-600 font-mono">© 2026 AuditFlow — Technical Web Intelligence for Agencies</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="auditflow.js"></script>
  <script>
    // Initialisierung der Icons
    if (window.lucide) lucide.createIcons();
  </script>
</body>
</html>
