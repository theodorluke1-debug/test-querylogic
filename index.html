<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueryLogic Pro | Engine Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --lime: #c8f135; --bg: #050505; --card: #0d0d0b; --border: #1a1a16; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #e8e8e0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: var(--card); border: 1px solid var(--border); }
        .neon-text { color: var(--lime); text-shadow: 0 0 15px rgba(200, 241, 53, 0.3); }
        .terminal { background: #000; border: 1px solid #1a1a16; height: 180px; overflow-y: auto; padding: 12px; font-size: 11px; color: #666; }
        .terminal-entry { margin-bottom: 4px; border-bottom: 1px solid #0a0a0a; padding-bottom: 2px; }
        .terminal-error { color: #ef4444; }
        .terminal-success { color: var(--lime); }
        .loader { width: 18px; height: 18px; border: 2px solid #222; border-top: 2px solid var(--lime); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-4">

    <div class="w-full max-w-xl">
        <div class="mb-10 text-center">
            <h1 class="text-3xl font-extrabold tracking-tighter uppercase italic">Query<span class="neon-text">Logic</span></h1>
            <div class="inline-flex items-center gap-2 mt-2 px-3 py-1 border border-lime-500/20 rounded-full bg-lime-500/5">
                <span id="statusPulse" class="w-1.5 h-1.5 rounded-full bg-zinc-700"></span>
                <span class="text-[9px] font-mono text-zinc-500 uppercase tracking-widest">SaaS CORE // FIXED v2.2</span>
            </div>
        </div>

        <div class="glass p-8 rounded-[32px] shadow-2xl space-y-6">
            <div class="grid grid-cols-1 gap-4">
                <input type="url" id="targetUrl" placeholder="Website URL (https://...)" class="w-full bg-black/50 border border-[#1a1a16] p-4 rounded-2xl outline-none focus:border-lime-500/50 transition-all text-white text-sm">
                <input type="password" id="apiKey" placeholder="Gemini API Key" class="w-full bg-black/50 border border-[#1a1a16] p-4 rounded-2xl outline-none focus:border-lime-500/50 transition-all text-white text-sm">
            </div>

            <button id="runBtn" onclick="executeAudit()" class="w-full bg-[#c8f135] text-black font-black py-5 rounded-2xl hover:scale-[1.01] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                EXECUTE AUDIT
            </button>

            <div class="mt-4">
                <div id="terminal" class="terminal mono rounded-xl">
                    <div class="terminal-entry">> Handshake bereit. Bitte Daten eingeben.</div>
                </div>
            </div>
        </div>

        <div id="results" class="hidden grid grid-cols-2 gap-4 mt-8">
            <div class="glass p-8 rounded-[24px] text-center">
                <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest text-xs">SEO Analysis</span>
                <div id="seoVal" class="text-5xl font-black neon-text mt-2">--</div>
            </div>
            <div class="glass p-8 rounded-[24px] text-center">
                <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest text-xs">Performance</span>
                <div id="perfVal" class="text-5xl font-black neon-text mt-2">--</div>
            </div>
        </div>
    </div>

    <script type="module">
        const term = document.getElementById('terminal');
        const btn = document.getElementById('runBtn');
        const pulse = document.getElementById('statusPulse');

        function log(msg, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `terminal-entry ${type === 'error' ? 'terminal-error' : type === 'success' ? 'terminal-success' : ''}`;
            entry.innerText = `> [${new Date().toLocaleTimeString()}] ${msg}`;
            term.appendChild(entry);
            term.scrollTop = term.scrollHeight;
        }

        async function executeAudit() {
            const url = document.getElementById('targetUrl').value.trim();
            const key = document.getElementById('apiKey').value.trim();

            if (!url || !key) {
                log("Fehler: Fehlende Eingabe.", "error");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> ANALYSIERE...';
            pulse.className = "w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse";
            
            // Wir nutzen die direkten API-Pfade ohne SDK-Abhängigkeit, um den 404 Fehler zu umgehen
            // Hier nutzen wir nun die v1 (stabil) statt v1beta
            const endpoints = [
                { id: 'gemini-1.5-flash', ver: 'v1' },
                { id: 'gemini-1.5-pro', ver: 'v1' },
                { id: 'gemini-1.0-pro', ver: 'v1' }
            ];

            let success = false;

            for (const model of endpoints) {
                if (success) break;
                log(`Versuche neuralen Pfad: ${model.id} (${model.ver})`);

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/${model.ver}/models/${model.id}:generateContent?key=${key}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Analysiere technisch die Website ${url}. Gib NUR ein JSON zurück: {"seo": Zahl 0-100, "perf": Zahl 0-100}. Kein Text davor oder danach.` }] }]
                        })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error?.message || `Status ${response.status}`);
                    }

                    const rawText = data.candidates[0].content.parts[0].text;
                    const cleanJson = rawText.match(/\{.*\}/s)[0];
                    const scores = JSON.parse(cleanJson);

                    document.getElementById('seoVal').innerText = scores.seo;
                    document.getElementById('perfVal').innerText = scores.perf;
                    document.getElementById('results').classList.remove('hidden');

                    log(`Erfolg! Modell ${model.id} hat geliefert.`, "success");
                    pulse.className = "w-1.5 h-1.5 rounded-full bg-[#c8f135]";
                    success = true;

                } catch (err) {
                    log(`Fail: ${model.id} -> ${err.message.substring(0, 50)}`, "error");
                    if (err.message.includes("429")) {
                        log("Quota Limit erreicht. Versuche nächsten Slot...", "error");
                    }
                }
            }

            if (!success) {
                log("SYSTEM ABBRUCH: Keine neuralen Antworten verfügbar.", "error");
                pulse.className = "w-1.5 h-1.5 rounded-full bg-red-600";
            }

            btn.disabled = false;
            btn.innerHTML = 'EXECUTE AUDIT';
        }

        window.executeAudit = executeAudit;
    </script>
</body>
</html>
