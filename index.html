<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueryLogic | SaaS Core Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --lime: #c8f135; --bg: #050505; --card: #0d0d0b; --border: #1a1a16; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #e8e8e0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: var(--card); border: 1px solid var(--border); }
        .neon-text { color: var(--lime); text-shadow: 0 0 15px rgba(200, 241, 53, 0.3); }
        .terminal { background: #000; border: 1px solid #1a1a16; height: 200px; overflow-y: auto; padding: 15px; font-size: 11px; color: #777; }
        .terminal-entry { margin-bottom: 6px; border-bottom: 1px solid #0a0a0a; padding-bottom: 4px; line-height: 1.4; }
        .terminal-error { color: #ff4444; }
        .terminal-success { color: var(--lime); }
        .terminal-warn { color: #facc15; }
        .loader { width: 20px; height: 20px; border: 2px solid #222; border-top: 2px solid var(--lime); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-4">

    <div class="w-full max-w-xl">
        <!-- Header -->
        <div class="mb-10 text-center">
            <h1 class="text-3xl font-extrabold tracking-tighter uppercase italic">Query<span class="neon-text">Logic</span></h1>
            <div class="inline-flex items-center gap-2 mt-2 px-3 py-1 border border-lime-500/20 rounded-full bg-lime-500/5">
                <span id="statusPulse" class="w-2 h-2 rounded-full bg-zinc-800"></span>
                <span class="text-[9px] font-mono text-zinc-500 uppercase tracking-widest">Stable Release v2.5 // Build 2026</span>
            </div>
        </div>

        <!-- UI Card -->
        <div class="glass p-8 rounded-[32px] shadow-2xl space-y-6">
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold text-zinc-600 ml-1">Website URL</label>
                    <input type="url" id="targetUrl" placeholder="https://apple.com" 
                        class="w-full bg-black/50 border border-[#1a1a16] p-4 rounded-2xl outline-none focus:border-lime-500/50 transition-all text-white text-sm">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold text-zinc-600 ml-1">AI Studio API Key</label>
                    <input type="password" id="apiKey" placeholder="Paste your Gemini Key" 
                        class="w-full bg-black/50 border border-[#1a1a16] p-4 rounded-2xl outline-none focus:border-lime-500/50 transition-all text-white text-sm">
                </div>
            </div>

            <button id="runBtn" onclick="initAudit()" class="w-full bg-[#c8f135] text-black font-black py-5 rounded-2xl hover:scale-[1.01] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                START ANALYSIS
            </button>

            <!-- Logging Terminal -->
            <div id="terminal" class="terminal mono rounded-xl shadow-inner">
                <div class="terminal-entry">> System online. Ready for Canada deployment.</div>
            </div>
        </div>

        <!-- Result Dashboard -->
        <div id="results" class="hidden grid grid-cols-2 gap-4 mt-8">
            <div class="glass p-8 rounded-[24px] text-center border-t border-lime-500/20">
                <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">SEO Score</span>
                <div id="seoVal" class="text-5xl font-black neon-text mt-2">0</div>
            </div>
            <div class="glass p-8 rounded-[24px] text-center border-t border-lime-500/20">
                <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Perf Score</span>
                <div id="perfVal" class="text-5xl font-black neon-text mt-2">0</div>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
    }
    </script>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        const term = document.getElementById('terminal');
        const btn = document.getElementById('runBtn');
        const pulse = document.getElementById('statusPulse');

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = `terminal-entry ${type === 'error' ? 'terminal-error' : type === 'success' ? 'terminal-success' : type === 'warn' ? 'terminal-warn' : ''}`;
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }

        async function initAudit() {
            const url = document.getElementById('targetUrl').value.trim();
            const key = document.getElementById('apiKey').value.trim();

            if (!url || !key) {
                log("Fehler: URL oder API-Key fehlt.", "error");
                return;
            }

            // UI Reset
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> VERARBEITE...';
            pulse.className = "w-2 h-2 rounded-full bg-blue-500 animate-pulse";
            document.getElementById('results').classList.add('hidden');
            
            log(`Initialisiere Audit für: ${url}`);

            // DEFINITIVE MODELL-KETTE (2026)
            const models = ['gemini-2.0-flash', 'gemini-1.5-flash'];
            let auditSuccessful = false;

            for (const modelId of models) {
                if (auditSuccessful) break;
                log(`Versuche Verbindung über ${modelId}...`, "info");

                try {
                    const genAI = new GoogleGenerativeAI(key);
                    const model = genAI.getGenerativeModel({ 
                        model: modelId,
                        generationConfig: { 
                            responseMimeType: "application/json",
                            temperature: 0.1 
                        }
                    });

                    const prompt = `Führe ein SEO- und Performance-Audit für ${url} durch. Gib EXAKT ein JSON-Objekt zurück: {"seo": Zahl (0-100), "perf": Zahl (0-100)}. Absolut kein anderer Text.`;
                    
                    const result = await model.generateContent(prompt);
                    const response = await result.response;
                    const text = response.text().trim();
                    
                    // JSON Säuberung
                    const jsonMatch = text.match(/\{[\s\S]*\}/);
                    if (!jsonMatch) throw new Error("Kein valides JSON empfangen.");
                    
                    const data = JSON.parse(jsonMatch[0]);

                    // UI Update
                    document.getElementById('seoVal').innerText = data.seo;
                    document.getElementById('perfVal').innerText = data.perf;
                    document.getElementById('results').classList.remove('hidden');
                    
                    log(`Erfolgreich! Daten über ${modelId} empfangen.`, "success");
                    pulse.className = "w-2 h-2 rounded-full bg-[#c8f135]";
                    auditSuccessful = true;

                } catch (err) {
                    const errMsg = err.message || "";
                    if (errMsg.includes("429")) {
                        log(`${modelId}: Limit erreicht (Quota Exceeded).`, "warn");
                    } else if (errMsg.includes("404")) {
                        log(`${modelId}: Modell nicht verfügbar (404).`, "error");
                    } else if (errMsg.includes("API_KEY_INVALID")) {
                        log("KRITISCH: API-Key ist ungültig.", "error");
                        break;
                    } else {
                        log(`Fehler bei ${modelId}: ${errMsg.substring(0, 40)}...`, "error");
                    }
                }
            }

            if (!auditSuccessful) {
                log("ABBRUCH: Alle Modelle sind blockiert oder überlastet.", "error");
                pulse.className = "w-2 h-2 rounded-full bg-red-600";
            }

            btn.disabled = false;
            btn.innerHTML = 'START ANALYSIS';
        }

        window.initAudit = initAudit;
    </script>
</body>
</html>
